<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h3>Cadastro da liga dos astronautas</h3>

    <form action="#">
        <label for="name">Nome:</label>
        <input type="text" id="name" name="name">

        <br><br>

        <label for="eml">Email:</label>
        <input type="email" id="eml" name="eml">

        <label for="pwd"> - Password:</label>
        <input type="password" id="pdw" name="pwd">

        <br><br>

        <label for="Dnascimento">Data de nascimento</label>
        <input type="date" id="Dnascimento" name="Dnascimento">

        <label for="Sfoto"> - Foto:</label>
        <input type="file" id="Sfotoo" name="Sfoto">

        <br><br>

        <label for="paises">Nacionalidade:</label>
        <select id="paises" name="paiseslist">
            <option value="Brasileiro(a)">Brasileiro(a)</option>
            <option value="Russo(a)">Russo(a)</option>
            <option value="Alemão(a)">Alemão(a)</option>
        </select>

        - Gênero:
        <input type="radio" id="M" name="gnr" value="M">
        <label for="M">M</label>
        <input type="radio" id="F" name="gnr" value="F">
        <label for="F">F</label>

        <br><br>

        <label for="check">Suas principais qualidades:</label>
        <br>
        <label for="int">Inteligência</label>
        <input type="checkbox" id="int" name="int" value="inteligencia">
        <label for="rls">| Resiliência</label>
        <input type="checkbox" id="rls" name="rls" value="resliencia">
        <label for="prp">| Preparo físico</label>
        <input type="checkbox" id="prp" name="prp" value="preparofisico">
        <label for="edc">| Educação</label>
        <input type="checkbox" id="edc" name="edc" value="educacao"> |

        <br><br>

        <textarea name="message" rows="10" cols="30">Porque você gostaria de ser um astronauta?</textarea>

        <br><br>

        <input type="submit" value="criar">
        
    </form>
    
</body>
</html>
