<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Us</title>
</head>

<body>
    <header>
        <a href="./index.html"><img src="./imgs/logo.png"></a>
        <a href="./pag2.html">| The Spaceships</a>
        <a href="./pag3.html">| Hire Us</a>
    </header>

    <hr>

    <div class="title-container">
        <h3>Hire Us Now</h3>
        <p>Leave a message to request one of our services and we will get back to you as soon as possible.</p>
    </div>

    <div class="form-container">
        <form action="#">
            <label for="fname">Name:</label>
            <input type="text" id="fname" name="fname">
            <label for="email"> - Email:</label>
            <input type="email" id="email" name="email">

            <br><br>

            <label for="spaceship">Spaceship:</label>
            <select id="spaceship" name="spaceship">
                <option value="Falcon 9">Falcon 9</option>
                <option value="Falcon Heavy">Falcon Heavy</option>
            </select>

            <label for="search">Type of Service</label>
            <input type="search" list="search">
            <datalist id="search">
                <option value="first item">
                <option value="second item">
                <option value="third item">
                <option value="fourth item">
            </datalist>

            <br><br>

            <input type="submit" value="Send Message">

        </form>

    </div>


</body>

</html>
